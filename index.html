<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六一小站</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }

        h1 {
            font-size: 2.5em;
            border-bottom: 3px solid #eee;
            padding-bottom: 0.3em;
            margin-bottom: 1em;
        }

        .content {
            font-size: 1.1em;
            padding: 15px;
            background: #fff;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>六一小站</h1>
    
    <div class="content">
        <h2>更新日志<h2>
        <p>2025年3月15日 晴</p>
        <p>这是我的神神秘秘网站，因为是静态网站所以不能知道你是谁</p>
            <p>2026年3月16日 晴</p>
            <p>当时只道是寻常，小学毕业第257天，回来看看，更新李默养鸡场</p>
    <div class="content">
        <a href="https://chat.deepseek.com/" target="top">deepseek</a>
        <a href="https://www.bilibili.com/" target="top">bilibili</a>
        <a href="https://img.xwyue.com/i/2025/03/23/67dfa730cd82b.gif" target="top">老头</a>
        <a href="https://www.cntodesk.com/windows/" target="top">远控软件</a>
<div id="bing-search" style="margin-top: 20px;">
    <input type="text" id="bingKeyword" placeholder="输入关键词进行搜索" style="padding: 8px; width: 70%;">
    <button id="startSearch" style="padding: 8px 15px; background: #0066cc; color: white; border: none; cursor: pointer;">搜索</button>
    <div id="countdownSection" style="display: none; margin-top: 10px;">
        <p>将在 <span id="countdown">5</span> 秒后跳转到Bing搜索</p>
        <button id="stopSearch" style="padding: 5px 10px; background: #cc0000; color: white; border: none; cursor: pointer; margin-top: 5px;">停止跳转</button>
    </div>
</div>

<script>
    document.getElementById('startSearch').addEventListener('click', function() {
        var keyword = document.getElementById('bingKeyword').value.trim();
        if (!keyword) {
            alert('请输入搜索关键词');
            return;
        }
        
        var countdownSection = document.getElementById('countdownSection');
        var countdownDisplay = document.getElementById('countdown');
        countdownSection.style.display = 'block';
        
        var secondsLeft = 5;
        countdownDisplay.textContent = secondsLeft;
        
        var countdownTimer = setInterval(function() {
            secondsLeft--;
            countdownDisplay.textContent = secondsLeft;
            
            if (secondsLeft <= 0) {
                clearInterval(countdownTimer);
                window.location.href = 'https://cn.bing.com/search?q=' + encodeURIComponent(keyword);
            }
        }, 1000);
        
        document.getElementById('stopSearch').onclick = function() {
            clearInterval(countdownTimer);
            countdownSection.style.display = 'none';
        };
    });
    
    // 支持按回车键搜索
    document.getElementById('bingKeyword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('startSearch').click();
        }
    });
</script>
